<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1fb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="60%">
      <stop offset="0" stop-color="#4a9eff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ff6b8a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)" stroke="#e7e8f1"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#glow)"/>
  <!-- cheek blush -->
  <ellipse cx="17" cy="40" rx="6" ry="2.6" fill="#ff96a2" opacity="0.5"/>
  <ellipse cx="47" cy="40" rx="6" ry="2.6" fill="#ff96a2" opacity="0.5"/>
  <!-- eyes -->
  <g>
    <circle cx="23" cy="29" r="11" fill="#1e1e2e"/>
    <circle cx="41" cy="29" r="11" fill="#1e1e2e"/>
    <!-- glossy white shine, offset up-left -->
    <circle cx="20" cy="26" r="5" fill="#ffffff"/>
    <circle cx="38" cy="26" r="5" fill="#ffffff"/>
    <!-- tiny catch-light, top-right -->
    <circle cx="27" cy="25.5" r="1.8" fill="#ffffff" opacity="0.9"/>
    <circle cx="45" cy="25.5" r="1.8" fill="#ffffff" opacity="0.9"/>
  </g>
  <!-- little smile -->
  <path d="M27 45 Q32 50 37 45" fill="none" stroke="#2d2d3e" stroke-width="2.4" stroke-linecap="round"/>
</svg>
